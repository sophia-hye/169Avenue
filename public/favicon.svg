<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Cap board (mortarboard) - flat diamond top -->
  <polygon points="32,8 4,24 32,34 60,24" fill="#000101"/>
  <!-- Cap base (skull cap) - visible below the board -->
  <path d="M18,28 L18,40 C18,46 25,52 32,52 C39,52 46,46 46,40 L46,28 L32,34 Z" fill="#1a1c1e"/>
  <!-- Board edge thickness -->
  <polygon points="4,24 4,26 32,36 60,26 60,24 32,34" fill="#2f3130"/>
  <!-- Button on top center -->
  <circle cx="32" cy="8" r="2.5" fill="#775a19"/>
  <!-- Tassel string from button -->
  <path d="M32,10.5 Q34,14 46,18 Q50,20 52,28" fill="none" stroke="#775a19" stroke-width="2" stroke-linecap="round"/>
  <!-- Tassel end -->
  <rect x="50" y="28" width="5" height="8" rx="2" fill="#775a19"/>
  <!-- Tassel fringe -->
  <line x1="51" y1="36" x2="51" y2="40" stroke="#775a19" stroke-width="1" stroke-linecap="round"/>
  <line x1="52.5" y1="36" x2="52.5" y2="41" stroke="#775a19" stroke-width="1" stroke-linecap="round"/>
  <line x1="54" y1="36" x2="54" y2="40" stroke="#775a19" stroke-width="1" stroke-linecap="round"/>
</svg>
