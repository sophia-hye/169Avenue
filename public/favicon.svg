<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#000101"/>
  <!-- Graduation cap - top part -->
  <polygon points="32,12 8,24 32,36 56,24" fill="#775a19"/>
  <!-- Graduation cap - tassel line -->
  <line x1="32" y1="12" x2="32" y2="6" stroke="#775a19" stroke-width="2"/>
  <circle cx="32" cy="5" r="2" fill="#775a19"/>
  <!-- Graduation cap - brim shadow -->
  <polygon points="32,36 8,24 8,28 32,40 56,28 56,24" fill="#5d4201"/>
  <!-- Graduation cap - bottom band -->
  <path d="M16,30 L16,42 Q32,52 48,42 L48,30 L32,40 Z" fill="#faf9f7" opacity="0.15"/>
  <!-- Tassel hanging -->
  <line x1="48" y1="24" x2="52" y2="34" stroke="#775a19" stroke-width="2" stroke-linecap="round"/>
  <rect x="50" y="34" width="4" height="6" rx="1" fill="#775a19"/>
  <!-- Gold accent dot -->
  <circle cx="32" cy="54" r="2" fill="#775a19"/>
</svg>
